<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      <img src="assets/logo.png" alt="Logo" class="logo">
    </ion-title>
  </ion-toolbar>
</ion-header>


<ion-content [fullscreen]="true" class="ion-padding login-page">
  <div class="center-container">
    <div class="login-container">
      <h2 class="sign-in-header">Sign in</h2>

      <ion-item lines="none" >
        <ion-input type="email" label="Email" label-placement="floating"  placeholder="Enter email" class="shadow-item">
        </ion-input>
        <ion-icon name="mail" slot="end"></ion-icon>
      </ion-item>

      <ion-item lines="none" >
        <ion-input type="password" label="Password" label-placement="floating"  placeholder="Enter password" class="shadow-item">
        </ion-input>
        <ion-icon name="lock-closed" slot="end"></ion-icon>
      </ion-item>
      
    
      <ion-item lines="none" class="remember">
        <!--[(ngModel)]="isChecked"-- inside the ion-checkbox element-->
        <ion-checkbox slot="start" ></ion-checkbox>
        <ion-label class="remember-label">Remember me</ion-label>
        <ion-button fill="clear" slot="end" class="forgot-password-button">Forgot password?</ion-button>
      </ion-item>
    
      <ion-button expand="full" color="translucent" class="sign-in-button shadow-item">Sign in</ion-button>
    
      <p class="signup-text question">Don't have an account?<ion-button (click)="navigateToTab2()" fill="clear" class="sign-up-button">Sign up</ion-button></p>
      
      </div>

      <span class="welcome">
        <div class="welcome-container">
          <h1 class="welcome-header">Hello, Welcome to WorkWise!</h1>
          <h2 class="about">Manage tasks, time and teamwork more efficiently</h2>
          <div class="icon-container">
            <ion-icon name="logo-instagram" size="large" class="insta-icon" (click)="openInstagram()"></ion-icon>
            <ion-icon name="logo-facebook" size="large" class="facebook-icon" (click)="openFacebook()"></ion-icon>
            <ion-icon name="logo-linkedin" size="large" class="linked-in-icon"></ion-icon>
          </div>
        </div>
      </span>
  </div>
</ion-content>
